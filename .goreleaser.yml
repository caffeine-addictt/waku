# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

# Release Configuration
project_name: waku
report_sizes: true

version: 2

before:
  hooks:
    - go mod tidy
    - ./scripts/completions.sh
    - ./scripts/manpages.sh

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
      - ppc64
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath

universal_binaries:
  - replace: false

archives:
  - name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
    format_overrides:
      - goos: windows
        formats: [zip]
    builds_info:
      group: root
      owner: root
      mtime: "{{ .CommitDate }}"
    files:
      - src: README.md
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: LICENSE
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: completions/*
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: manpages/*
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"

aurs:
  - name: waku-bin
    homepage: https://github.com/caffeine-addictt/waku
    description: A simple template repository generator. Lets make starting new projects feel like a breeze again!
    maintainers:
      - Jun Xiang <contact@ngjx.org>
    private_key: "{{ .Env.AUR_PRIVATE_KEY }}"
    license: AGPL-3.0
    git_url: "ssh://aur@aur.archlinux.org/waku-bin.git"
    skip_upload: auto
    depends:
      - git
    package: |-
      # bin
      install -Dm755 "./waku" -t "$pkgdir/usr/bin"

      # license
      install -Dm644 "./LICENSE" "$pkgdir/usr/share/licenses/waku"

      # completions
      mkdir -p "${pkgdir}/usr/share/bash-completion/completions/"
      mkdir -p "${pkgdir}/usr/share/zsh/site-functions/"
      mkdir -p "${pkgdir}/usr/share/fish/vendor_completions.d/"
      install -Dm644 "./completions/waku.bash" "$pkgdir/usr/share/bash-completion/completions/waku"
      install -Dm644 "./completions/waku.zsh" "$pkgdir/usr/share/zsh/site-functions/_waku"
      install -Dm644 "./completions/waku.fish" "$pkgdir/usr/share/fish/vendor_completions.d/waku.fish"

      # man page
      mkdir -p "$pkgdir/usr/share/man/man1"
      install -Dm644 "./manpages/waku.1.gz" "$pkgdir/usr/share/man/man1/waku.1.gz"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    url_template: "https://github.com/caffeine-addictt/waku/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

dockers_v2:
  - images:
      - "caffeinec/waku"
      - "ghcr.io/caffeine-addictt/waku"
    tags:
      - "v{{ .Version }}"
      - "{{ if .IsNightly }}nightly{{ end }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    dockerfile: Dockerfile.release
    labels:
      "io.artifacthub.package.readme-url": "https://raw.githubusercontent.com/caffeine-addictt/waku/main/README.md"
      "io.artifacthub.package.logo-url": "https://waku.ngjx.org/static/logo.png"
      "io.artifacthub.package.maintainers": '[{"name":"Jun Xiang","email":"contact@ngjx.org"}]'
      "io.artifacthub.package.license": "AGPL-3.0"
      "org.opencontainers.image.description": "A simple template repository generator. Lets make starting new projects feel like a breeze again!"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
    annotations:
      "org.opencontainers.image.description": "Make starting new projects feel like a breeze again"

nfpms:
  - maintainer: Jun Xiang <contact@ngjx.org>
    description: A simple template repository generator. Lets make starting new projects feel like a breeze again!
    homepage: "https://github.com/caffeine-addictt/waku"
    license: AGPL-3.0
    formats: [apk, deb, archlinux]
    dependencies: [git]

homebrew_casks:
  - homepage: "https://github.com/caffeine-addictt/waku"
    license: "AGPL-3.0"
    skip_upload: auto
    directory: Formula/waku
    name: waku
    repository:
      owner: caffeine-addictt
      name: homebrew-tap
      branch: "waku"
      token: "{{ .Env.GITHUB_PAT }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    description: "A simple template repository generator. Lets make starting new projects feel like a breeze again!"
    completions:
      bash: completions/waku.bash
      zsh: completions/waku.zsh
      fish: completions/waku.fish
    manpages:
      - man/waku.1.gz
    dependencies:
      - cask: git

