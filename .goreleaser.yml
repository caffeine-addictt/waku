scoops:
  - repository:
      owner: caffeine-addictt
      name: scoop-bucket
      token: "{{ .Env.GITHUB_PAT }}"
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: bucket
    homepage: https://github.com/caffeine-addictt/waku
    description: A simple template repository generator. Lets make starting new projects feel like a breeze again!
    license: AGPL-3.0

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    output: true
    artifacts: checksum
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - --yes

docker_signs:
  - cmd: cosign
    artifacts: manifests
    output: true
    args:
      - "sign"
      - "${artifact}@${digest}"
      - --yes

release:
  ids: [default]
  draft: false
  replace_existing_draft: true
  target_commitish: "{{ .Commit }}"
  prerelease: auto
  mode: replace
  skip_upload: false

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  abbrev: 0
  filters:
    exclude:
      - "^(T|t)ypo"
  groups:
    - title: Features
      regexp: '^.*?(F|f)eat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?(F|f)ix(\(.+\))??!?:.+$'
      order: 1
    - title: Improvements
      regexp: '^.*?((D|d)ocs?|(S|s)tyle|(T|t)est|(B|b)uild|(P|p)erf|(R|r)efactor)(\(.+\))??!?:.+$'
      order: 2
    - title: Security issues
      regexp: ^.*?(S|s)ecurity.*?$
      order: 4
    - title: Others
      order: 999
